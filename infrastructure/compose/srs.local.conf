listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    2;
        hls_window      10;
    }

    http_hooks {
        enabled         on;
        on_publish      http://host.docker.internal:4002/hooks/srs/on-publish;
        on_unpublish    http://host.docker.internal:4002/hooks/srs/on-unpublish;
    }
}
