services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: livestream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d livestream"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  srs:
    image: ossrs/srs:5
    command: ["./objs/srs", "-c", "conf/srs.local.conf"]
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
    volumes:
      - ./srs.local.conf:/usr/local/srs/conf/srs.local.conf:ro

volumes:
  postgres-data:
